spring.application.name=BudgetKing

# ===== DATASOURCE (Ajustado estrictamente a los valores del contenedor) =====
spring.datasource.url=jdbc:mysql://localhost:3307/budget_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=user_budget
spring.datasource.password=user_password

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# NOTA: Se eliminˇ spring.jpa.database-platform.
# Spring Boot 4 / Hibernate 6+ detectan el dialecto automßticamente de forma ˇptima.