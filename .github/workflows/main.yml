name: CI/CD Pipeline - BudgetKing

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BudgetKingApp/BudgetKing
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: BudgetKingApp/BudgetKing/pom.xml

      - name: Run Tests con Maven
        env:
          TESTCONTAINERS_REUSE_ENABLE: true
        run: mvn clean test -B

      - name: Build with Maven (Skip Tests)
        run: mvn clean package -DskipTests -B

      # --- CD ---
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./BudgetKingApp/BudgetKing
          file: ./BudgetKingApp/BudgetKing/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/budget-king-backend:latest