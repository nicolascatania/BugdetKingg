name: CI/CD Pipeline - BudgetKing

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven" # Esto ya es bueno, asegúrate de que el path sea correcto

      # Testcontainers necesita Docker. Ubuntu ya lo tiene.
      # Para reutilizar el contenedor, configuramos la variable de entorno:
      - name: Run Tests con Maven
        env:
          TESTCONTAINERS_REUSE_ENABLE: true
        run: |
          cd BudgetKing
          mvn clean test -B # -B (Batch mode) reduce el ruido del log en la consola

      - name: Build with Maven (Skip Tests)
        run: |
          cd BudgetKing
          mvn clean package -DskipTests -B

      # --- CD ---
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./BudgetKing
          file: ./BudgetKing/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/budget-king-backend:latest