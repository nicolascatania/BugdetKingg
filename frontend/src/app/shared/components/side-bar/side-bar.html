<aside class="bg-slate-950 flex flex-col border-r border-slate-800 h-full transition-all duration-300 ease-in-out"
  [class.w-64]="sidebarOpen()" [class.w-16]="!sidebarOpen()">

  <div class="h-16 px-4 flex items-center justify-between border-b border-slate-800">
    <span class="text-indigo-400 font-bold text-lg tracking-tight transition-opacity"
      [class.hidden]="!sidebarOpen()">BudgetKing 👑</span>

    <button (click)="toggleSidebar()"
      class="p-2 rounded-lg hover:bg-slate-900 text-slate-400 hover:text-indigo-400 transition">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <nav class="flex-1 px-3 py-6 space-y-1.5 text-sm">
    <a routerLink="/home" routerLinkActive="bg-indigo-600/10 border-indigo-500/50 text-indigo-400"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent transition-all">
      <i class="fa-solid fa-house w-5 text-center"></i>
      <span *ngIf="sidebarOpen()" class="font-medium">Home</span>
    </a>

    <a routerLink="/transactions" routerLinkActive="bg-indigo-600/10 border-indigo-500/50 text-indigo-400"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent transition-all">
      <i class="fa-solid fa-arrow-right-arrow-left w-5 text-center"></i>
      <span *ngIf="sidebarOpen()" class="font-medium">Transactions</span>
    </a>

    <a routerLink="/dashboard" routerLinkActive="bg-indigo-600/10 border-indigo-500/50 text-indigo-400"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent transition-all">
      <i class="fa-solid fa-chart-line w-5 text-center"></i>
      <span *ngIf="sidebarOpen()" class="font-medium">Dashboard</span>
    </a>

    <a routerLink="/accounts" routerLinkActive="bg-indigo-600/10 border-indigo-500/50 text-indigo-400"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent transition-all">
      <i class="fa-solid fa-wallet w-5 text-center"></i>
      <span *ngIf="sidebarOpen()" class="font-medium">Accounts</span>
    </a>

    <a routerLink="/categories" routerLinkActive="bg-indigo-600/10 border-indigo-500/50 text-indigo-400"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent transition-all">
      <i class="fa-solid fa-tags w-5 text-center"></i>
      <span *ngIf="sidebarOpen()" class="font-medium">Categories</span>
    </a>
  </nav>

  <div class="p-4 border-t border-slate-800">
    <button (click)="logout()"
      class="flex items-center gap-3 w-full px-3 py-2 rounded-lg text-rose-400/80 hover:bg-rose-950/30 hover:text-rose-400 transition">
      <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
      <span *ngIf="sidebarOpen()" class="font-medium">Logout</span>
    </button>
  </div>
</aside>
