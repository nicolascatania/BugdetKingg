<div class="relative min-h-screen w-full bg-slate-950 overflow-hidden">

  <div class="fixed inset-0 z-0 pointer-events-none">
    <div class="block absolute top-[-5%] right-[-5%] w-96 h-96 rounded-full bg-indigo-600/20 bg-blur animate-float">
    </div>
    <div class="block absolute bottom-[-5%] left-[-5%] w-96 h-96 rounded-full bg-indigo-900/20 bg-blur animate-float"
      style="animation-delay: -5s;"></div>

    <i class="block fa-solid fa-user-plus absolute top-[10%] right-[10%] text-indigo-500/20 text-7xl animate-float"></i>
    <i class="block fa-solid fa-shield-halved absolute top-[40%] left-[5%] text-indigo-500/20 text-8xl animate-float"
      style="animation-delay: -3s;"></i>
    <i class="block fa-solid fa-bell absolute bottom-[15%] right-[20%] text-indigo-500/20 text-6xl animate-float"
      style="animation-delay: -4s;"></i>
    <i class="block fa-solid fa-chart-pie absolute bottom-[20%] left-[15%] text-indigo-500/20 text-7xl animate-float"
      style="animation-delay: -2s;"></i>
  </div>

  <div class="relative z-10 flex min-h-screen flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
      <div
        class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-500/10 border border-indigo-500/20 shadow-[0_0_15px_rgba(99,102,241,0.2)] relative">
        <i class="fa-solid fa-crown text-indigo-400 text-3xl"></i>
        <span class="absolute text-indigo-950 font-black text-sm mt-1">$</span>
      </div>
      <h2 class="mt-8 text-center text-3xl font-extrabold tracking-tight text-white">Create your account</h2>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-300">Name</label>
            <input formControlName="name" type="text"
              class="mt-2 block w-full rounded-xl bg-slate-900/50 border border-slate-700/50 px-4 py-3 text-white" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300">Last Name</label>
            <input formControlName="lastName" type="text"
              class="mt-2 block w-full rounded-xl bg-slate-900/50 border border-slate-700/50 px-4 py-3 text-white" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300">Email</label>
          <input formControlName="email" type="email"
            class="mt-2 block w-full rounded-xl bg-slate-900/50 border border-slate-700/50 px-4 py-3 text-white" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300">Password</label>
          <input formControlName="password" type="password"
            class="mt-2 block w-full rounded-xl bg-slate-900/50 border border-slate-700/50 px-4 py-3 text-white" />
        </div>
        <button type="submit" [disabled]="registerForm.invalid"
          class="mt-4 w-full rounded-xl bg-indigo-600 px-4 py-3 text-sm font-bold text-white hover:bg-indigo-500 transition-all disabled:opacity-50">
          Create account
        </button>
      </form>
      <p class="mt-10 text-center text-sm text-slate-400">
        Already a member? <a routerLink="/login"
          class="font-semibold text-indigo-400 hover:text-indigo-300 cursor-pointer">Login</a>
      </p>
    </div>
  </div>
</div>
