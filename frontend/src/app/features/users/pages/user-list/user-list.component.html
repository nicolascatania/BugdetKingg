<div class="w-full px-2 sm:px-6 py-4 sm:py-8 max-w-5xl mx-auto space-y-6 text-slate-200">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-100">Users</h1>
    </div>

    <div
        class="bg-slate-900/40 border border-slate-800 rounded-xl shadow-lg overflow-hidden divide-y divide-slate-800/60">
        @if (loading()) {
        <!-- Aquí mantén tu lógica de skeleton loader que ya tienes -->
        <div class="p-8 text-center text-slate-500">Loading...</div>
        } @else {
        @for (user of users(); track user.id) {
        <div class="p-4 sm:px-6 flex items-center justify-between hover:bg-slate-800/30 transition-colors">
            <div>
                <h3 class="font-medium text-slate-200">{{ user.name }} {{ user.lastName }}</h3>
                <p class="text-sm text-slate-400">{{ user.email }}</p>
            </div>

            <!-- Toggle Switch -->
            <button (click)="toggleUserStatus(user)" [class.bg-indigo-600]="user.enabled"
                [class.bg-slate-700]="!user.enabled"
                class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none">
                <span [class.translate-x-5]="user.enabled" [class.translate-x-0]="!user.enabled"
                    class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out">
                </span>
            </button>
        </div>
        } @empty {
        <div class="p-8 text-center text-slate-500">No users found.</div>
        }
        }
    </div>

    @if (!loading() && paginationState.totalElements() > 0) {
    <app-pagination [page]="paginationState.currentPage()" [size]="paginationState.pageSize()"
        [totalElements]="paginationState.totalElements()" [totalPages]="paginationState.totalPages()"
        (changePage)="onPageChange($event)">
    </app-pagination>
    }
</div>
