<div class="space-y-5 text-slate-200">

  <div class="p-4 rounded-xl border border-slate-800/80 bg-slate-900/30 shadow-xl">
    <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="flex flex-col md:flex-row items-end gap-4">
      <div class="w-full md:w-auto flex-1 grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">From</label>
          <input type="date" formControlName="dateFrom"
            class="w-full rounded-lg bg-slate-950/50 border border-slate-800/80 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition-all [color-scheme:dark]" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">To</label>
          <input type="date" formControlName="dateTo"
            class="w-full rounded-lg bg-slate-950/50 border border-slate-800/80 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition-all [color-scheme:dark]" />
        </div>
      </div>
      <div class="w-full md:w-auto">
        <button type="submit"
          class="w-full md:w-44 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-4 py-2 text-sm font-semibold shadow-md transition-all active:scale-[0.98]">
          Apply Range
        </button>
      </div>
    </form>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full">
    <div class="bg-gradient-to-r from-slate-900/50 to-indigo-950/30 rounded-xl p-4 border border-slate-800/80 shadow-md flex items-center justify-between px-5">
      <div>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Total Balance</p>
        <p class="text-lg font-black text-slate-100 tracking-tight mt-1">
          {{ dashboardData()?.totalBalance | currency:'ARS':'symbol':'1.0-0' }}
        </p>
      </div>
      <div class="rounded-lg p-2 bg-indigo-500/10 text-indigo-400 text-sm hidden sm:block">
        <i class="pi pi-wallet"></i>
      </div>
    </div>

    <div class="bg-slate-900/30 rounded-xl p-4 border border-slate-800/80 shadow-md flex items-center justify-between px-5 hover:border-rose-500/20 transition-colors">
      <div>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Expenses</p>
        <p class="text-lg font-bold text-rose-400 tracking-tight mt-1">
          {{ dashboardData()?.expense | currency:'ARS':'symbol':'1.0-0' }}
        </p>
      </div>
      <div class="rounded-lg p-2 bg-rose-500/10 text-rose-400 text-sm hidden sm:block">
        <i class="pi pi-arrow-down-right"></i>
      </div>
    </div>

    <div class="bg-slate-900/30 rounded-xl p-4 border border-slate-800/80 shadow-md flex items-center justify-between px-5 hover:border-teal-500/20 transition-colors">
      <div>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Income</p>
        <p class="text-lg font-bold text-teal-400 tracking-tight mt-1">
          {{ dashboardData()?.income | currency:'ARS':'symbol':'1.0-0' }}
        </p>
      </div>
      <div class="rounded-lg p-2 bg-teal-500/10 text-teal-400 text-sm hidden sm:block">
        <i class="pi pi-arrow-up-right"></i>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-10 gap-5">
    
    <div class="lg:col-span-7">
      <app-expenses-income-each-month 
        [accounts]="accountsSignal()" 
        [chartData]="annualChartData()"
        (accountChanged)="onAccountFilterChanged($event)">
      </app-expenses-income-each-month>
    </div>

    <div class="lg:col-span-3 bg-slate-900/30 rounded-2xl p-5 border border-slate-800/80 shadow-2xl flex flex-col justify-between">
      <h3 class="text-xs font-bold tracking-tight text-slate-400 uppercase mb-3">Expenses by Category</h3>
      <div class="h-72 flex items-center justify-center relative">
        <canvas id="expensePie"></canvas>
      </div>
    </div>

  </div>

  <div class="space-y-2">
    <h3 class="text-xs font-bold tracking-tight text-slate-400 uppercase px-1">Movements of this month</h3>
    <div class="overflow-x-auto rounded-xl border border-slate-800/60 shadow-lg">
      <last-moves></last-moves>
    </div>
  </div>

</div>
