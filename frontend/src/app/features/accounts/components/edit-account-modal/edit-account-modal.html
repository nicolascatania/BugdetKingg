<ui-modal [open]="true" [title]="account ? 'Edit Account' : 'Create Account'" (closed)="close(false)">
  <div modal-body>
    <form [formGroup]="form" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Name</label>
        <input type="text" formControlName="name" placeholder="e.g., Bank, Cash, Crypto"
          class="w-full rounded-lg bg-slate-900/60 border border-border px-3.5 py-2 text-sm text-slate-200 focus:outline-none focus:border-accent-blue transition-colors" />
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Description</label>
        <textarea formControlName="description" placeholder="Optional details..." rows="3"
          class="w-full rounded-lg bg-slate-900/60 border border-border px-3.5 py-2 text-sm text-slate-200 focus:outline-none focus:border-accent-blue transition-colors resize-none"></textarea>
      </div>
    </form>
  </div>

  <div modal-footer class="flex justify-end gap-2.5">
    <button
      class="px-4 py-2 text-sm font-medium rounded-lg bg-slate-800 hover:bg-slate-700/80 text-slate-300 border border-border transition-colors"
      (click)="close(false)">
      Cancel
    </button>

    <button
      class="px-4 py-2 text-sm font-medium rounded-lg bg-indigo-600 hover:bg-indigo-500 text-slate-100 transition-colors disabled:opacity-40 disabled:hover:bg-indigo-600"
      (click)="submit()" [disabled]="form.invalid">
      Save
    </button>
  </div>
</ui-modal>
