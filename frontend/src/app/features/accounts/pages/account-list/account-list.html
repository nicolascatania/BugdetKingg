<div class="w-full px-4 sm:px-6 py-6 sm:py-8 max-w-7xl mx-auto space-y-6 text-slate-200">

  <div class="flex items-center justify-between gap-4">
    <h1 class="text-xl sm:text-2xl font-bold tracking-tight text-slate-100 whitespace-nowrap">My Accounts</h1>

    <button (click)="openAccountModal(null)"
      class="flex items-center gap-2 px-3.5 py-2 rounded-lg bg-indigo-600 text-slate-100 text-xs sm:text-sm font-semibold hover:bg-indigo-500 active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500/30 shrink-0">
      <i class="fa-solid fa-plus"></i>
      <span>New Account</span>
    </button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
    @for (account of accounts(); track account.id) {
    <div
      class="group relative bg-card border border-border rounded-xl p-4 sm:p-5 shadow-lg transition-all hover:border-indigo-500/20 hover:shadow-indigo-500/5 flex flex-col justify-between min-h-[150px]">

      <div class="flex items-start justify-between gap-3 w-full">
        <div class="flex items-center gap-3 min-w-0 flex-1">
          <div class="rounded-lg p-2.5 sm:p-3 border border-border/60 bg-slate-900/40 text-indigo-400 text-sm shrink-0">
            <i class="fa-solid" [ngClass]="account.icon || 'fa-wallet'"></i>
          </div>

          <div class="min-w-0 flex-1">
            <h3 class="text-sm sm:text-base font-bold text-slate-100 truncate">
              {{ account.name }}
            </h3>
            <p class="text-xs text-slate-400 mt-0.5 block truncate">
              {{ account.description || 'No description' }}
            </p>
          </div>
        </div>

        <div
          class="flex items-center gap-1.5 shrink-0 bg-slate-900/40 md:bg-transparent p-1 md:p-0 rounded-lg border border-border/40 md:border-none">
          <button (click)="openAccountModal(account)" title="Edit account"
            class="p-1 text-slate-400 hover:text-accent-blue transition-colors focus:outline-none">
            <i class="fa-solid fa-pen-to-square text-xs sm:text-sm"></i>
          </button>
          <button (click)="deleteAccount(account)" title="Delete account"
            class="p-1 text-slate-400 hover:text-accent-red transition-colors focus:outline-none">
            <i class="fa-solid fa-trash text-xs sm:text-sm"></i>
          </button>
        </div>
      </div>

      <div class="mt-5 border-t border-border/60 pt-4 flex items-center justify-between gap-4 w-full">
        <p class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-wider shrink-0 select-none">
          Balance
        </p>
        <div class="min-w-0 flex-1 flex justify-end pr-1">
          <p class="text-xl sm:text-2xl font-black tabular-nums tracking-tight text-right truncate" [ngClass]="{
              'text-accent-green': account.balance >= 0,
              'text-accent-red': account.balance < 0
            }">
            {{ account.balance | currency:'ARS':'symbol':'1.0-0' }}
          </p>
        </div>
      </div>
    </div>
    } @empty {
    <div
      class="col-span-1 sm:col-span-2 lg:col-span-3 bg-card border border-border border-dashed rounded-xl p-8 sm:p-12 text-center shadow-inner">
      <div class="rounded-full p-3 bg-slate-800 border border-border/60 text-slate-600 inline-block mb-3">
        <i class="fa-solid fa-wallet text-2xl"></i>
      </div>
      <h3 class="text-base font-semibold text-slate-300">No Accounts Registered</h3>
      <p class="text-xs sm:text-sm text-slate-500 mt-1 max-w-sm mx-auto">
        Start by creating your first account.
      </p>
    </div>
    }
  </div>

</div>

@if(isModalOpen()) {
<app-edit-account-modal [account]="selectedAccount()" (closed)="onAccountModalClose($event)"></app-edit-account-modal>
}
