<div class="mb-10">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-lg font-bold tracking-tight text-slate-100">Accounts</h2>
    <span class="text-xs font-semibold text-slate-400 px-2.5 py-1 rounded-lg bg-slate-900 border border-slate-800">
      {{ accounts().length }} Registered
    </span>
  </div>

  @if (accounts().length === 0) {
    <p class="text-slate-500 text-sm italic">There are no registered accounts.</p>
  }

  <div class="hidden md:grid grid-cols-2 lg:grid-cols-3 gap-5">
    @for(account of accounts(); track account.id){
      <div class="bg-slate-900/50 rounded-xl p-4 border border-slate-800/80 shadow-lg transition-all duration-200 hover:border-slate-700 hover:translate-y-[-1px]">
        <div class="flex items-center justify-between border-b border-slate-800/40 pb-2">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">{{ account.name }}</p>
          <i class="fa-solid fa-building-columns text-slate-600 text-xs"></i>
        </div>
        <p class="text-xl font-bold mt-3 text-slate-100 tracking-tight">
          {{ account.balance | currency:'ARS':'symbol':'1.2-2' }}
        </p>
        @if(account.description) {
          <p class="text-slate-500 text-[11px] mt-2 truncate" [title]="account.description">
            {{ account.description }}
          </p>
        }
      </div>
    }
  </div>
</div>
