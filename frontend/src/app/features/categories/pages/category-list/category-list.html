<div class="w-full px-2 sm:px-6 py-4 sm:py-8 max-w-5xl mx-auto space-y-6 text-slate-200">
  <div class="flex items-center justify-between gap-4">
    <h1 class="text-xl sm:text-2xl font-bold tracking-tight text-slate-100">Categories</h1>
    <button (click)="openCategoryModal(null)"
      class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-lg bg-indigo-600 text-slate-100 text-sm font-semibold hover:bg-indigo-500 active:scale-[0.98] transition-all">
      <i class="fa-solid fa-plus text-xs"></i>
      <span class="hidden sm:inline">New Category</span>
    </button>
  </div>

  <div class="bg-slate-900/40 border border-border rounded-xl shadow-lg overflow-hidden divide-y divide-border/60">
    @for (category of categories(); track category.id) {
    <div
      class="group p-4 sm:px-6 hover:bg-slate-800/30 transition-colors grid grid-cols-1 sm:flex sm:items-center sm:justify-between gap-3 sm:gap-4">

      <div class="flex items-center gap-3 min-w-0">
        <div
          class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-slate-800 border border-slate-700 text-indigo-400">
          <i class="fa-solid" [ngClass]="category.icon || 'fa-tags'"></i>
        </div>
        <h3 class="text-sm font-medium text-slate-200 truncate flex-1">
          {{ category.name }}
        </h3>
      </div>

      <div class="flex items-center justify-end gap-2 border-t border-slate-800/50 pt-3 sm:border-none sm:pt-0">
        <button (click)="openCategoryModal(category)" title="Edit"
          class="flex items-center gap-2 px-3 py-1.5 text-xs text-slate-400 hover:text-indigo-400 bg-slate-800/50 rounded-md transition-colors">
          <i class="fa-solid fa-pen"></i> <span class="sm:hidden">Edit</span>
        </button>
        <button (click)="deleteCategory(category)" title="Delete"
          class="flex items-center gap-2 px-3 py-1.5 text-xs text-slate-400 hover:text-red-400 bg-slate-800/50 rounded-md transition-colors">
          <i class="fa-solid fa-trash"></i> <span class="sm:hidden">Delete</span>
        </button>
      </div>
    </div>
    } @empty {
    <div class="p-8 text-center text-slate-500 text-sm">No categories defined.</div>
    }
  </div>

  @if (paginationState.totalElements() > 0) {
  <app-pagination [page]="paginationState.currentPage()" [size]="paginationState.pageSize()"
    [totalElements]="paginationState.totalElements()" [totalPages]="paginationState.totalPages()"
    (changePage)="onPageChange($event)"></app-pagination>
  }
</div>


@if (isModalCategoryOpen()) {
<app-edit-category [category]="selectedCategory()" (submitEvent)="onCategorySaved()">
</app-edit-category>
}
